<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>तक्रार व अभिप्राय अर्ज</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#2563eb);
padding:20px;
min-height:100vh;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#2563eb;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
}

input,
select,
textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:16px;
}

textarea{
resize:none;
}

.btn{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#1d4ed8;
}

.home-btn{
display:inline-block;
margin-bottom:15px;
padding:10px 20px;
background:#16a34a;
color:white;
text-decoration:none;
border-radius:10px;
}

.note{
background:#f3f4f6;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="home-btn">
🏠 Home
</a>

<h1>📝 तक्रार व अभिप्राय अर्ज</h1>

<p class="subtitle">
वेबसाइट समस्या किंवा नवीन सेवा जोडण्यासाठी अर्ज करा
</p>

<div class="note">
<b>तक्रार प्रकार:</b><br>
🌐 Website Issue Complaint<br>
➕ New Service Add Request
</div>

<form>

<input type="text"
placeholder="पूर्ण नाव"
required>

<input type="tel"
placeholder="मोबाईल नंबर"
required>

<input type="email"
placeholder="ईमेल आयडी">

<select required>
<option value="">तक्रार प्रकार निवडा</option>
<option>🌐 Website Issue Complaint</option>
<option>➕ New Service Add Request</option>
</select>

<input type="text"
placeholder="तक्रारीचा विषय"
required>

<textarea rows="8"
placeholder="तुमची तक्रार किंवा नवीन सेवा माहिती सविस्तर लिहा..."
required></textarea>

<button class="btn" type="submit">
📨 तक्रार सबमिट करा
</button>

</form>

</div>

</body>
</html>
