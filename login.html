<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dipak Khillare Login</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#06b6d4,#7c3aed);
}

.login-box{
    width:380px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    text-align:center;
    color:#fff;
}

.logo{
    font-size:55px;
    margin-bottom:10px;
}

h1{
    font-size:28px;
    margin-bottom:5px;
}

.subtitle{
    font-size:14px;
    opacity:0.9;
    margin-bottom:25px;
}

.input-group{
    position:relative;
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:14px 45px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.15);
    color:#fff;
    font-size:15px;
}

.input-group input::placeholder{
    color:#eee;
}

.input-group i{
    position:absolute;
    left:15px;
    top:15px;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#fff;
    color:#2563eb;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-3px);
}

.footer{
    margin-top:20px;
    font-size:13px;
}

.footer a{
    color:#fff;
    text-decoration:none;
    font-weight:bold;
}
/* Top Right Buttons */
.top-buttons{
    position: fixed;
    top: 15px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 9999;
}

.nav-btn{
    border: none;
    padding: 12px 22px;
    border-radius: 50px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    color: white;
    transition: 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.25);
}

.back-btn{
    background: linear-gradient(135deg,#ff512f,#dd2476);
}

.home-btn{
    background: linear-gradient(135deg,#00c853,#00e676);
}

.nav-btn:hover{
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
}

.nav-btn:active{
    transform: scale(0.95);
}

/* Mobile Responsive */
@media(max-width:768px){
    .nav-btn{
        padding:10px 16px;
        font-size:14px;
    }
}
</style>
</head>
<body>
<!-- Top Right Buttons -->
<div class="top-buttons">
    <button class="nav-btn back-btn" onclick="history.back()">
        ⬅ Back
    </button>

    <button class="nav-btn home-btn" onclick="window.location.href='index.html'">
        🏠 Home
    </button>
</div>

<div class="login-box">

    <div class="logo">
        <i class="fas fa-user-shield"></i>
    </div>

    <h1>Dipak Khillare</h1>
    <div class="subtitle">
        Login Area
    </div>

    <form>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" placeholder="Username">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" placeholder="Password">
        </div>

        <button class="login-btn">
            Login Now
        </button>

    </form>

    <div class="footer">
        Forgot Password? <a href="#">Reset</a>
    </div>

</div>

</body>
</html>
